name: CI

on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  devenv-build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: sestrella
          extraPullNames: devenv
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Run tests
        run: devenv test
      - name: Build packages
        run: |
          echo '{ cachix.push = "sestrella"; }' > devenv.local.nix
          devenv build
    
  hm-build:
    runs-on: macos-latest
    needs: [devenv-build]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: sestrella
          extraPullNames: devenv
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build configuration
        run: nix run home-manager/release-26.05 -- build --flake ${{ github.workspace }}
